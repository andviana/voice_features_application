{% extends "base.html" %}
{% block title %}Parâmetros Atuais{% endblock %}

{% block content %}
<div class="rounded-2xl bg-white p-6 shadow-sm">
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-semibold">Parâmetros Atuais</h1>

    <a href="{{ url_for('params.edit_params') }}"
       class="rounded-xl border px-4 py-2 text-sm hover:bg-slate-50">
      Editar
    </a>
  </div>

  <div class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2">
    {% for k, v in params.items() %}
      <div class="rounded-xl border bg-slate-50 p-4">
        <div class="text-xs font-medium text-slate-600">
          {{ k }}
        </div>
        <div class="mt-1 font-mono text-sm text-slate-900 break-all">
          {{ v }}
        </div>
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
