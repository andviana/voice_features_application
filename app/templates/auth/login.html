{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md rounded-2xl bg-white p-6 shadow-sm">
    <h1 class="text-xl font-semibold">Entrar</h1>

    <form method="post" class="mt-4 space-y-3">
      <div>
        <label class="text-sm font-medium">E-mail</label>
        <input name="email" type="email" required
               class="mt-1 w-full rounded-xl border px-3 py-2 outline-none focus:ring-2 focus:ring-slate-200" />
      </div>

      <div>
        <label class="text-sm font-medium">Senha</label>
        <input name="password" type="password" required
               class="mt-1 w-full rounded-xl border px-3 py-2 outline-none focus:ring-2 focus:ring-slate-200" />
      </div>

      <button type="submit"
              class="w-full rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800">
        Entrar
      </button>
    </form>
  </div>
{% endblock %}
