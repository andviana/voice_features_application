{% extends "base.html" %}
{% block title %}Info - {{ props.filename }}{% endblock %}

{% block content %}
  <div class="rounded-2xl bg-white p-6 shadow-sm">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-xl font-semibold">Info do áudio</h1>
        <p class="mt-1 text-sm text-slate-600">
          <span class="rounded bg-slate-100 px-2 py-0.5 font-mono text-xs">{{ props.rel_id }}</span>
        </p>
      </div>

      <a class="rounded-xl border px-4 py-2 text-sm hover:bg-slate-50" href="/audio-raw">
        Voltar
      </a>
    </div>

    <div class="mt-4 rounded-xl border bg-slate-950 p-4">
      <audio controls class="w-full">
        <source src="{{ url_for('audio_raw.play_audio', group=props.group, filename=props.filename) }}" type="audio/wav" />
      </audio>
    </div>

    <div class="mt-4 grid grid-cols-1 gap-3 md:grid-cols-2">
      {% for k, v in props_dict.items() %}
        <div class="rounded-xl border bg-slate-50 p-3">
          <div class="text-xs font-medium text-slate-600">{{ k }}</div>
          <div class="mt-1 font-mono text-xs text-slate-900 break-all">{{ v }}</div>
        </div>
      {% endfor %}
    </div>
  </div>
{% endblock %}
