{% extends "base.html" %}

{% block content %}

<h1 class="text-xl font-semibold mb-4">{{filename}}</h1>

<div class="grid grid-cols-2 gap-4">

<audio controls src="/analysis/play/raw/{{group}}/{{filename}}"></audio>
<audio controls src="/analysis/play/processed/{{group}}/{{filename}}"></audio>

</div>

<h2 class="mt-6 font-semibold">Dados Demográficos</h2>

<ul>
<li>Label: {{demographics.label}}</li>
<li>Age: {{demographics.age}}</li>
<li>Sex: {{demographics.sex}}</li>
</ul>

<h2 class="mt-6 font-semibold">Features</h2>

<table class="table-auto border">

<tr>
<th>Feature</th>
<th>Mean</th>
<th>Std</th>
</tr>

{% for f in features %}

<tr>

<td>{{f.name}}</td>

<td class="{% if f.mean == 0 or f.mean != f.mean %}text-red-500{% endif %}">
{{f.mean}}
</td>

<td class="{% if f.std == 0 or f.std != f.std %}text-red-500{% endif %}">
{{f.std}}
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
